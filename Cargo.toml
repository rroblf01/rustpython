[package]
name = "rustpython"
version = "0.1.0"
edition = "2021"

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
panic = "abort"

[features]
default = []
profile = []  # Enable execution profiling for PGO JIT

[dependencies]
cranelift = "0.109.1"
cranelift-frontend = "0.109.1"
cranelift-jit = "0.109.1"
cranelift-module = "0.109.1"
cranelift-native = "0.109.1"
num-bigint = "0.4"
num-traits = "0.2"
regex = "1"
smallvec = "1"
once_cell = "1"
libloading = "0.8"
